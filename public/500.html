<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="Launch into Infrared, the next gen proxy." />
	<meta name="keywords" content="Proxy, Unblocker, Infrared Unblocker, Infrared" />
	<meta property="og:image" content="/assets/logo.webp" />
	<title>Connection Error - Infrared</title>
	<link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
	<link rel="stylesheet" href="/css/index.css" />
	<link rel="stylesheet" href="/css/themes.css" />
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..400,0..1" />
	<script src="/js/themes.js"></script>
</head>
<body>
	<script src="/js/localforage.min.js"></script>
	<script src="/js/starfield.js"></script>
	<nav class="sidebar">
		<div class="sidebar-logo"><a href="/"><img src="/assets/logo.webp" alt="Infrared" /></a></div>
	</nav>
	<div class="main-content">
		<canvas id="starfield"></canvas>
		<div class="bg-glow"></div>
		<div class="bg-grid"></div>
		<div class="error-landscape">
			<div class="error-landscape-sky"></div>
			<div class="error-landscape-sun"></div>
			<div class="error-landscape-mountains"></div>
			<div class="error-landscape-grid"></div>
			<div class="error-landscape-fog"></div>
		</div>
		<div class="error-page">
			<div class="error-icon" aria-hidden="true">!</div>
			<h1>Unable to reach this site</h1>
			<p id="errorMessage">The connection could not be established. This may be a temporary network issue, a blocked destination, or a problem with the proxy service.</p>
			<p id="errorDetails" class="error-details" style="display:none"></p>
			<div class="error-actions">
				<button class="btn-primary" onclick="history.go(-2)">Go Back</button>
				<a href="/" class="btn-secondary" style="text-decoration:none">Home</a>
			</div>
		</div>
	</div>
	<script>
		(function() {
			var params = new URLSearchParams(window.location.search);
			var error = params.get('error') || '';
			var detail = params.get('detail') || '';
			var messageEl = document.getElementById('errorMessage');
			var detailsEl = document.getElementById('errorDetails');
			if (error) {
				var messages = {
					'connection': 'The connection could not be established. This may be a temporary network issue, a blocked destination, or a problem with the proxy service.',
					'offline': 'Your device appears to be offline. Check your network connection and try again.',
					'timeout': 'The request timed out. The destination may be slow or unavailable right now.',
					'blocked': 'This destination is blocked or could not be reached through the proxy.',
					'service': 'The proxy service encountered an error while loading this page.',
					'unknown': 'An unexpected error occurred while loading this page.'
				};
				messageEl.textContent = messages[error] || messages['unknown'];
			}
			if (detail) {
				detailsEl.textContent = 'Error reference: ' + detail;
				detailsEl.style.display = 'block';
			}
		})();
	</script>
</body>
</html>
