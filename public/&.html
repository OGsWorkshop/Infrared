	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:wght@300;400;500;600;700;800&display=swap" />

</head>
<body>
	<script src="/js/localforage.min.js"></script>
	<div class="failtoast" id="failtoast">
		<div class="failtoast-content"><i class="fa fa-solid fa-circle-exclamation"></i><div class="failtoast-message"><span class="text-1">Failed</span><span class="text-2">Something went wrong. Please try again.</span></div></div>
		<i class="fa-solid fa-xmark failtoast-close" onclick="this.parentElement.classList.remove('active')"></i>
		<div class="failtoast-progress"></div>
	</div>

	<nav class="sidebar">
		<div class="sidebar-logo"><a href="/"><img src="/assets/logo.webp" alt="Infrared" /></a></div>
		<div class="sidebar-nav">
		<a href="/" class="sidebar-link"><span class="material-symbols-outlined">cottage</span><span class="sidebar-tooltip">Home</span></a>
			<a href="/g" class="sidebar-link"><span class="material-symbols-outlined">joystick</span><span class="sidebar-tooltip">Games</span></a>
			<a href="/a" class="sidebar-link"><span class="material-symbols-outlined">apps</span><span class="sidebar-tooltip">Apps</span></a>
			<a href="/&" class="sidebar-link active"><span class="material-symbols-outlined">public</span><span class="sidebar-tooltip">Browser</span></a>
		<a href="/~" class="sidebar-link"><span class="material-symbols-outlined">tune</span><span class="sidebar-tooltip">Settings</span></a>
	</div>
	<div class="sidebar-bottom">
			<a href="https://discord.gg/yTmmCFv59Q" target="_blank" class="sidebar-discord"><i class="fa-brands fa-discord"></i><span class="sidebar-tooltip">Discord</span></a>
		</div>
	</nav>

	<div class="main-content">
		<div class="browser-page">
			<div class="browser-toolbar utilityBar" id="utilityBar">
				<button class="browser-nav-btn backButton" id="backBtn" disabled><span class="material-symbols-outlined">arrow_back</span></button>
				<button class="browser-nav-btn forwardButton" id="fwdBtn" disabled><span class="material-symbols-outlined">arrow_forward</span></button>
				<button class="browser-nav-btn refreshButton" id="refreshBtn"><span class="material-symbols-outlined">refresh</span></button>
				<div class="browser-url-bar">
					<span class="browser-url-secure webSecurityIcon" id="securityIcon"><span class="material-symbols-outlined" style="font-size:16px">lock</span></span>
					<input type="text" class="browser-url-input" id="gointoinfrared2" placeholder="Enter search or web address" />
				</div>
				<button class="browser-nav-btn homeButton" id="homeBtn" title="Home"><span class="material-symbols-outlined">cottage</span></button>
				<button class="browser-nav-btn" onclick="inspectelement()" title="Dev Tools"><span class="material-symbols-outlined">code</span></button>
				<button class="browser-nav-btn fullscreenButton" id="fullscreenBtn" title="Fullscreen"><span class="material-symbols-outlined">fullscreen</span></button>
				<a href="/~/#/proxy" class="browser-nav-btn" title="Proxy Settings"><span class="material-symbols-outlined">instant_mix</span></a>
			</div>
			<div class="browser-iframe-wrapper">
				<div class="browser-home" id="browserHome">
					<div class="browser-home-panel">
						<div class="browser-home-search"><span style="position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--theme-text-dim);font-size:22px;font-weight:700;font-family:var(--font-display)">G</span><input type="text" id="gointoinfrared" placeholder="Search Infrared..." /></div>
						<div class="browser-shortcuts-big shortcutsBig" style="display:none"></div>
						<div class="browser-shortcuts shortcuts"></div>
					</div>
				</div>
				<iframe id="intoinfrared" class="browser-iframe" style="display:none" frameborder="0" sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-modals"></iframe>
			</div>
		</div>
	</div>

	<div class="spinner-wrapper" id="spinnerWrapper"><div class="spinner-ring"></div></div>
	<canvas id="starfield"></canvas>
	<div class="bg-glow"></div>
	<div class="bg-grid"></div>

	<script src="/js/starfield.js"></script>
	<script src="/js/json-loader.js"></script>
	<script src="/js/c.js"></script>
	<script src="/js/p.js"></script>
	<script src="/js/&.js"></script>
